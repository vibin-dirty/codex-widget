name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-test:
    name: Build and test
    uses: ./.github/workflows/build-test.yml

  package-release:
    name: Package and release
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Restore
        run: dotnet restore CodexWidget.slnx

      - name: Create packages
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          package_dir="artifacts/release"
          mkdir -p "${package_dir}"

          scripts/publish-web.sh \
            --configuration Release \
            --artifact-set release \
            --package-path "${package_dir}/codex-widget-web-${tag}.zip"

          scripts/publish-win-x64-package.sh \
            --configuration Release \
            --runtime win-x64 \
            --self-contained true \
            --artifact-set release \
            --package-path "${package_dir}/codex-widget-win-x64-${tag}.zip"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ github.ref_name }}
          path: artifacts/release/*.zip
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" artifacts/release/*.zip --clobber
          else
            gh release create "${TAG_NAME}" artifacts/release/*.zip \
              --verify-tag \
              --title "Codex Widget ${TAG_NAME}" \
              --generate-notes
          fi
